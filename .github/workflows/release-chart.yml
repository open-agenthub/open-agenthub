name: Release Helm chart

# Publishes the chart to the repo's gh-pages branch via chart-releaser whenever
# the chart version changes. Helm repo URL: https://open-agenthub.github.io/open-agenthub
on:
  push:
    branches: [main]
    paths: ["helm/**"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
