name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test tests/AgentHub.Api.Tests/AgentHub.Api.Tests.csproj -c Release

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        # Runs vitest when tests exist; a no-op script must exit 0.
        run: npm test --if-present
