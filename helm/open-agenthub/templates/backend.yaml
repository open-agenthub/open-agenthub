{{- if and (or .Values.chat.telegram.enabled .Values.chat.signal.enabled) (gt (int .Values.backend.replicas) 1) }}
{{- fail "chat.telegram/chat.signal require backend.replicas=1 (Telegram getUpdates and the Signal receive socket allow only one consumer)" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenthub-backend
  labels: {{ include "agenthub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels: { app: agenthub-backend }
  template:
    metadata:
      labels: { app: agenthub-backend }
      annotations:
        # Force a rollout when the config/secret changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: agenthub-backend
      {{- if .Values.image.pullSecret }}
      imagePullSecrets: [{ name: {{ .Values.image.pullSecret }} }]
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: backend
          image: {{ include "agenthub.backendImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: agenthub-config }
            - secretRef:    { name: agenthub-secrets }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources: {{ toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agenthub-backend
  labels: {{ include "agenthub.labels" . | nindent 4 }}
spec:
  selector: { app: agenthub-backend }
  ports: [{ port: 80, targetPort: 8080 }]
