# Namespace where the agent session pods run.
# The release itself is installed into the control-plane namespace (e.g. "agenthub").
sessionsNamespace: agenthub-sessions
# Create the sessions namespace (incl. PSA labels) as part of the release.
# Set to false if the namespace is managed outside of Helm.
createSessionsNamespace: true

image:
  # Base path; the component images are named {registry}/{backend|frontend|agent-runtime}:{tag}
  registry: ghcr.io/open-agenthub/open-agenthub
  tag: latest
  pullPolicy: IfNotPresent
  # Name of an existing dockerconfigjson secret (empty = none). Must exist in the release
  # namespace AND in the sessionsNamespace (agent pods use it to pull the agent-runtime image).
  pullSecret: ""

ingress:
  enabled: true
  host: agenthub.example.com
  className: nginx
  # cert-manager ClusterIssuer for the TLS certificate (empty = omit the annotation).
  clusterIssuer: ""
  tlsSecretName: agenthub-tls

backend:
  replicas: 2
  environment: Production
  developmentAuth:
    enabled: false
    headerName: X-AgentHub-Test-User
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }

frontend:
  replicas: 1
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits: { cpu: 200m, memory: 128Mi }

# Override for a local browser origin when ingress is disabled.
frontendOrigin: ""

agent:
  port: 7681
  gitCloneImage: alpine/git:2.45.2
  # Pull policy for the agent-runtime image in session pods. Use "Always" when
  # the image tag moves (e.g. :latest) so nodes don't serve a stale cache.
  pullPolicy: IfNotPresent
  runtimeClassName: ""
  maxCpu: "2"
  maxMemory: 4Gi
  # Users may specify a custom container image per session.
  allowCustomImage: true
  # Users may run sessions as root (tools can be installed).
  # Requires PSA "baseline" (instead of "restricted") on the sessionsNamespace.
  allowRootSessions: true
  # Extra TCP egress ports allowed from session pods (besides 53/80/443/22),
  # e.g. [9000] for a self-hosted S3/MinIO on a non-standard port.
  extraEgressPorts: []

# OAuth2/OIDC provider. Empty authority = auth disabled (dev mode, all requests as user "dev").
oidc:
  authority: ""
  # Expected "aud" claim of access tokens. Empty = skip audience validation
  # (e.g. Keycloak without an audience mapper on the client).
  audience: agenthub
  clientId: agenthub
  scope: openid profile email
  requireHttpsMetadata: true

# S3/MinIO for session state, scrollback, and artifacts. Empty serviceUrl = AWS endpoints.
s3:
  serviceUrl: ""
  region: us-east-1
  bucket: agenthub
  accessKey: ""
  secretKey: ""
  # Skip TLS certificate validation — only for internal MinIO with a self-signed cert.
  insecureTls: false

n8n:
  webhookUrl: ""

# Token/cost usage dashboard via OpenTelemetry. When enabled, session pods export
# Claude Code's token/cost metrics (OTLP/HTTP protobuf) to the internal backend service,
# which aggregates them per session/owner for the "Usage" view. Agent->backend egress is
# already permitted by the networkpolicy, so no extra egress rule is needed.
telemetry:
  enabled: false
  # Optional OTLP endpoint base override (the exporter appends "/v1/metrics").
  # Empty = the internal backend service (http://agenthub-backend.<ns>.svc.cluster.local/internal/otel).
  otlpEndpoint: ""

# Enterprise license (offline-verified). Enterprise features (ee/) only run with a
# valid token. Neither the token nor the verification key are chart values: the token
# is activated in the app's Admin area (stored in the DB), and the public key used to
# verify it is compiled into the binary (EnterpriseLicense.PublicKeyPem). This way
# enterprise features can't be unlocked by flipping a Helm flag or swapping the key.

# Enterprise features (require a valid license).
ee:
  # Comma-separated list of admin usernames (preferred_username). Empty = every
  # signed-in user is an admin (bootstrap; lock this down for real deployments).
  admins: ""
  # Optional link to the billing portal (Stripe customer portal via the license service),
  # surfaced in the Admin area for subscription/invoice management.
  billingPortalUrl: ""
  # License service the instance reports its seat count to (heartbeat). Reporting renews
  # the license token; the reported month-close count drives Stripe seat billing. Empty
  # disables reporting. See the privacy policy — only an aggregate user count is sent.
  license:
    serviceUrl: ""
    reportIntervalHours: 24
  # Slack integration: asks you in a Slack thread whenever a session waits for input,
  # and turns your thread replies into the agent's answer. Uses Socket Mode.
  slack:
    enabled: false
    channel: ""       # target channel id (e.g. C0123ABCD)
    botToken: ""      # xoxb-… (chat.postMessage)
    appToken: ""      # xapp-… (Socket Mode)

# Git OAuth: lets users connect GitHub/GitLab accounts ("Connect" on the Account page)
# so sessions clone/push their repos without a manual PAT. Optional — leave providers
# empty to keep only the manual credentials flow.
git:
  # HMAC key that signs the OAuth "state" parameter. Set a random 32+ char string
  # (must be stable across replicas/restarts). Generated by the quickstart installer.
  stateKey: ""
  # One entry per provider. Register an OAuth app at the provider with the callback URL
  # https://<ingress.host>/api/git/callback/<id>. `baseUrl` enables self-hosted instances.
  # Scopes default to "repo read:user" (GitHub) / "api read_user" (GitLab).
  providers: []
  #  - id: github
  #    type: github            # github | gitlab
  #    displayName: GitHub
  #    baseUrl: ""             # e.g. https://github.example.com for GitHub Enterprise
  #    clientId: ""
  #    clientSecret: ""
  #    scopes: ""

# Dev Postgres inside the cluster. For prod: set enabled=false and externalDatabase.connectionString.
postgres:
  enabled: true
  image: postgres:16-alpine
  # false = emptyDir instead of a PVC (data is lost on pod restart). Only for testing,
  # when no storage provisioner is available.
  persistence: true
  storage: 5Gi
  storageClass: ""
  # Required when enabled=true; written to the secret and embedded in the connection string.
  password: ""

externalDatabase:
  # Only relevant when postgres.enabled=false, e.g. "Host=...;Database=...;Username=...;Password=..."
  connectionString: ""
