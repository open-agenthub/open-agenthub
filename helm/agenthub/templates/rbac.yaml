# ServiceAccount of the backend (control plane)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agenthub-backend
  labels: {{ include "agenthub.labels" . | nindent 4 }}
---
# ServiceAccount of the agent pods – deliberately WITHOUT any permissions (the token is not mounted anyway)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agenthub-agent
  namespace: {{ .Values.sessionsNamespace }}
  labels: {{ include "agenthub.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
# The backend may manage ONLY the required objects, and ONLY in the session namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agenthub-session-manager
  namespace: {{ .Values.sessionsNamespace }}
  labels: {{ include "agenthub.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agenthub-backend-binding
  namespace: {{ .Values.sessionsNamespace }}
  labels: {{ include "agenthub.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agenthub-session-manager
subjects:
  - kind: ServiceAccount
    name: agenthub-backend
    namespace: {{ .Release.Namespace }}
