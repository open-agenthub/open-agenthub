apiVersion: v1
kind: Secret
metadata:
  name: agenthub-secrets
  labels: {{ include "agenthub.labels" . | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__Postgres: {{ include "agenthub.postgresConnectionString" . | quote }}
  S3__AccessKey: {{ .Values.s3.accessKey | quote }}
  S3__SecretKey: {{ .Values.s3.secretKey | quote }}
