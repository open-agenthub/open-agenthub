{{- if .Values.postgres.enabled }}
# Minimal Postgres for dev/test. In production, use externalDatabase.connectionString.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels: {{ include "agenthub.labels" . | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      securityContext: { fsGroup: 999, runAsNonRoot: true, runAsUser: 999 }
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB,   value: agenthub }
            - { name: POSTGRES_USER, value: agenthub }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-secret, key: password } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
{{- if .Values.postgres.persistence }}
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources: { requests: { storage: {{ .Values.postgres.storage }} } }
{{- else }}
      volumes:
        - name: data
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels: {{ include "agenthub.labels" . | nindent 4 }}
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels: {{ include "agenthub.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "postgres.password is required when postgres.enabled=true" .Values.postgres.password | quote }}
{{- end }}
