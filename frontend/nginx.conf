# Serves the SPA. /api and /ws are routed directly to the backend by the ingress.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Assets with hashed filenames can be cached for a long time
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: /auth/callback also lands on index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
