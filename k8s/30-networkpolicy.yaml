# --- Session namespace: everything locked down by default ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: agenthub-sessions
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# The backend may reach the terminal port of the agent pods (ingress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-agent
  namespace: agenthub-sessions
spec:
  podSelector:
    matchLabels: { agenthub.dev/component: agent }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: agenthub }
      ports:
        - { protocol: TCP, port: 7681 }
---
# Agent egress: only DNS, HTTPS (Anthropic/MCP/GitLab), and SSH (git). Restrict further if needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-egress
  namespace: agenthub-sessions
spec:
  podSelector:
    matchLabels: { agenthub.dev/component: agent }
  policyTypes: [Egress]
  egress:
    - to: []
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 22 }
        - { protocol: TCP, port: 80 }   # package mirrors (apt/apk partly use HTTP)
---
# Agent -> backend (status/notify/artifact URL callbacks)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-to-backend
  namespace: agenthub-sessions
spec:
  podSelector:
    matchLabels: { agenthub.dev/component: agent }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: agenthub }
      ports:
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 80 }
