apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenthub-backend
  namespace: agenthub
spec:
  replicas: 2
  selector:
    matchLabels: { app: agenthub-backend }
  template:
    metadata:
      labels: { app: agenthub-backend }
    spec:
      serviceAccountName: agenthub-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: backend
          image: registry.example.com/agenthub/backend:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: agenthub-config }
            - secretRef:    { name: agenthub-secrets }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agenthub-backend
  namespace: agenthub
spec:
  selector: { app: agenthub-backend }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agenthub-config
  namespace: agenthub
data:
  AgentHub__Namespace: "agenthub-sessions"
  # Legacy Claude-only option retained for compatibility with older backends.
  AgentHub__AgentImage: "registry.example.com/agenthub/agent-runtime-claude:latest"
  AgentHub__ClaudeAgentImage: "registry.example.com/agenthub/agent-runtime-claude:latest"
  AgentHub__CodexAgentImage: "registry.example.com/agenthub/agent-runtime-codex:latest"
  AgentHub__AgentPort: "7681"
  AgentHub__CallbackBaseUrl: "http://agenthub-backend.agenthub.svc.cluster.local"
  S3__ServiceUrl: ""
  S3__Region: "us-east-1"
  S3__Bucket: "agenthub"
  N8n__WebhookUrl: ""
  Oidc__Authority: ""
  Oidc__Audience: "agenthub"
  FrontendOrigin: "https://agenthub.example.com"
---
# Keep secrets separate. In prod, populate via SealedSecrets/Vault; never commit them in plaintext.
apiVersion: v1
kind: Secret
metadata:
  name: agenthub-secrets
  namespace: agenthub
type: Opaque
stringData:
  ConnectionStrings__Postgres: "Host=postgres.agenthub.svc.cluster.local;Database=agenthub;Username=agenthub;Password=CHANGE_ME"
  S3__AccessKey: "CHANGE_ME"
  S3__SecretKey: "CHANGE_ME"
